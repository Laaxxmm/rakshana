# Explicit Nixpacks plan for Railway.
#
# Why we override the default:
#   - Default Node detection on Railway gives us Node 18, which can't parse
#     a package-lock.json generated by npm 11 (lockfileVersion 3 with new
#     fields).
#   - Default install command is `npm ci`, which is strict — any drift in
#     the lockfile bails with a usage dump instead of recovering. We use
#     `npm install --legacy-peer-deps` so a peer-dep warning doesn't
#     fail the build.
#   - We force the install phase to run `prisma generate` (the package's
#     postinstall script does this, but redundancy here makes failure
#     modes easier to diagnose in Railway logs).

[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
cmds = [
  "npm install --legacy-peer-deps --include=dev",
  "npx prisma generate",
]

[phases.build]
cmds = [
  "npx prisma migrate deploy",
  "npx next build",
]

[start]
cmd = "npm run start"
